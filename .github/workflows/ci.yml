name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=high

  api-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r apps/api/requirements.txt
      - run: pip-audit -r apps/api/requirements.txt --format cyclonedx-json --output python-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: python-sbom.cdx.json

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker run --rm -v "$PWD:/repo" aquasec/trivy:latest fs --format cyclonedx --output /repo/repo-sbom.cdx.json /repo
      - uses: actions/upload-artifact@v4
        with:
          name: repo-sbom
          path: repo-sbom.cdx.json

  api-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pip install -r apps/api/requirements.txt
      - run: PYTHONPATH=apps/api pytest apps/api/tests

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker run --rm -v "$PWD:/repo" aquasec/trivy:latest fs --scanners vuln,secret,misconfig,license --severity HIGH,CRITICAL --exit-code 1 /repo
