services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://api:8000
      ALLOW_INTERNAL_API_HTTP: "true"
    depends_on:
      api:
        condition: service_healthy
  api:
    build: ./apps/api
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    environment:
      TEMP_STORAGE: local
      FRONTEND_URL: http://localhost:3000
      MAX_FILE_MB: 100
      MAX_BATCH_FILES: 20
      MAX_BATCH_MB: 250
      MAX_OUTPUT_MB: 500
      BATCH_CONCURRENCY: 3
      CLEANUP_TTL_MINUTES: 10
      TEMP_FILE_TTL_MINUTES: 60
      CLEANUP_INTERVAL_SECONDS: 300
      ANALYTICS_PATH: /data/all_files_convertor_analytics.json
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_REQUESTS: 30
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_RETENTION_HOURS: 24
      REDIS_URL: redis://redis:6379/0
      TRUST_PROXY_HEADERS: "false"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - api_analytics:/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

volumes:
  api_analytics:
  redis_data:
